<!DOCTYPE html>
<html>
<head>
<title>LEGO1 Admin</title>
<style>
body{
    background:#08142b;
    color:white;
    font-family:Arial,sans-serif;
    margin:20px;
}
.card{
    background:#152a5e;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}
input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
}
button{
    padding:10px 20px;
    margin-top:10px;
}
</style>
</head>
<body>

<h1>👑 LEGO1 ADMIN</h1>

<div class="card">
<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginStatus"></p>
</div>

<div id="panel" style="display:none;">

<div class="card">
<h2>News Update</h2>
<textarea id="newsText"></textarea>
<button onclick="saveNews()">Publish News</button>
</div>

<div class="card">
<h2>Now Playing</h2>
<input id="nowPlayingInput">
<button onclick="saveNowPlaying()">Update</button>
</div>

<div class="card">
<h2>Voting</h2>
<button onclick="openVoting()">Open Voting</button>
<button onclick="closeVoting()">Close Voting</button>
</div>

</div>

<script>

function login(){
    if(
        document.getElementById("user").value==="Markus" &&
        document.getElementById("pass").value==="6642"
    ){
        document.getElementById("panel").style.display="block";
        document.getElementById("loginStatus").innerText="Logged in";
    }else{
        document.getElementById("loginStatus").innerText="Wrong login";
    }
}

function saveNews(){
    alert("Firebase connection coming next");
}

function saveNowPlaying(){
    alert("Firebase connection coming next");
}

function openVoting(){
    alert("Voting opened");
}

function closeVoting(){
    alert("Voting closed");
}

</script>

</body>
</html>
