<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEGO1 - LegoVision 2026</title>

<style>
body{
    margin:0;
    background:#08142b;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#10204d;
    text-align:center;
    padding:20px;
}

.hero{
    text-align:center;
    padding:30px;
}

.card{
    background:#152a5e;
    margin:20px;
    padding:20px;
    border-radius:15px;
}

.live{
    background:red;
    display:inline-block;
    padding:8px 15px;
    border-radius:8px;
    font-weight:bold;
}

button{
    background:#ff2ea6;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

.center{
    text-align:center;
}
</style>
</head>

<body>

<header>
    <h1>📺 LEGO1</h1>
    <p>The Brick Television Network</p>
</header>

<div class="hero">
    <span class="live">LIVE</span>
    <h2>LEGOVISION 2026</h2>
    <p>Hosted at Amanda House</p>
</div>

<div class="card">
    <h2>🎬 Event Player</h2>
    <video controls width="100%">
        <source src="event.mp4" type="video/mp4">
    </video>
    <p>Upload event.mp4 later.</p>
</div>

<div class="card">
    <h2>📺 Now Playing</h2>
    <p id="nowPlaying">LegoVision 2026</p>
</div>

<div class="card">
    <h2>📰 News</h2>
    <p id="news">Welcome to LegoVision 2026!</p>
</div>

<div class="card">
    <h2>🗳️ Voting Status</h2>
    <p id="voteStatus">CLOSED</p>
</div>

<div class="card">
    <h2>⏳ Countdown</h2>
    <p id="countdown">Loading...</p>
</div>

<div class="center">
    <a href="vote.html">
        <a href="vote.html"><button>Vote</button></a>
<a href="admin.html"><button>Admin</button></a>
    </a>

    <a href="entries.html">
        <button>Entries</button>
    </a>

    <a href="results.html">
        <button>Results</button>
    </a>

    <a href="admin.html">
        <button>Admin</button>
    </a>
</div>

<script>
function updateCountdown(){

    const target = new Date("2026-06-20T21:00:00");
    const now = new Date();

    const diff = target - now;

    if(diff <= 0){
        document.getElementById("countdown").innerText =
        "LegoVision is LIVE!";
        return;
    }

    const days = Math.floor(diff/(1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60))%24);
    const minutes = Math.floor((diff/(1000*60))%60);

    document.getElementById("countdown").innerText =
    days + " days " +
    hours + " hours " +
    minutes + " minutes";
}

updateCountdown();
setInterval(updateCountdown,60000);
</script>

</body>
</html>
