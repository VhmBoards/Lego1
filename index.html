<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

};

get(ref(db,"settings/nowPlaying"))
.then(snapshot=>{
    if(snapshot.exists()){
        document.getElementById("nowPlaying").innerText=snapshot.val();
    }
});

get(ref(db,"news/message1/text"))
.then(snapshot=>{
    if(snapshot.exists()){
        document.getElementById("news").innerText=snapshot.val();
    }
});

get(ref(db,"settings/votingOpen"))
.then(snapshot=>{
    if(snapshot.exists()){
        document.getElementById("voteStatus").innerText =
        snapshot.val() ? "OPEN" : "CLOSED";
    }
});

function updateCountdown(){
    const target = new Date("2026-06-20T21:00:00");
    const now = new Date();

    const diff = target - now;

    if(diff <= 0){
        document.getElementById("countdown").innerText =
        "LegoVision has started!";
        return;
    }

    const days = Math.floor(diff/(1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60))%24);
    const minutes = Math.floor((diff/(1000*60))%60);

    document.getElementById("countdown").innerText =
    `${days} days ${hours} hours ${minutes} minutes`;
}

updateCountdown();
setInterval(updateCountdown,60000);

</script>
